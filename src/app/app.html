@if(layout.overlay()){
<div id="loading-overlay" animate.enter="fade-in" animate.leave="fade-out">
    <div class="logo-container">
        <img src="logo.png" id="loading-logo" alt="">
        <br>
        <h1 id="loading-overlay-message">{{layout.overlay_message}}</h1>
    </div>
</div>
}

@if (!auth.logged_in){
<app-login></app-login>
} @else {
<app-main></app-main>
}
